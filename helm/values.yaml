replicaCount: 1

frontend:
  image:
    repository: nginx
    tag: "1.27"
    pullPolicy: IfNotPresent
  containerPort: 80
  service:
    type: ClusterIP
    port: 80

backend:
  image:
    # For local kind: build with `docker build -t terraform-parse-service:1.0 .`
    repository: terraform-parse-service
    tag: "1.0"
    pullPolicy: IfNotPresent
  containerPort: 8000
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
